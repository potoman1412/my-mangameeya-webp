name: Build webp.all (Windows)

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release and attach artifacts'
        required: false
        default: 'false'
      release_tag:
        description: 'Release tag to create (optional; if empty and triggered by tag push, that tag is used)'
        required: false
      release_name:
        description: 'Release title'
        required: false
      release_body:
        description: 'Release notes/body'
        required: false
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [ x64 ]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install libwebp via vcpkg
      shell: powershell
      run: |
        Write-Host "Setting up vcpkg and installing libwebp"
        $vcpkgDir = Join-Path $PWD 'vcpkg'
        if (-not (Test-Path $vcpkgDir)) {
          git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
        }
        Push-Location $vcpkgDir
        if (-not (Test-Path .\vcpkg.exe)) {
          & .\bootstrap-vcpkg.bat
        }
        Pop-Location
        if ('${{ matrix.arch }}' -eq 'x64') { $triplet = 'x64-windows' } else { $triplet = 'x86-windows' }
        Write-Host "Installing libwebp as shared (dynamic) for triplet: $triplet"
        & $vcpkgDir\vcpkg.exe install libwebp --triplet $triplet --recurse
        $vcpkgInstalled = Join-Path $vcpkgDir 'installed'
        $inc = Join-Path $vcpkgInstalled "$triplet\include"
        $libp = Join-Path $vcpkgInstalled "$triplet\lib"
        Write-Host "vcpkg include: $inc"
        Write-Host "vcpkg lib: $libp"
        echo "VCPKG_INC=$inc" >> $env:GITHUB_ENV
        echo "VCPKG_LIB=$libp" >> $env:GITHUB_ENV

    - name: Show installed libwebp libs
      shell: powershell
      run: |
        Write-Host "Listing .lib files in $env:VCPKG_LIB"
        if (Test-Path $env:VCPKG_LIB) {
          Get-ChildItem -Path $env:VCPKG_LIB -Filter *.lib -Recurse | ForEach-Object { Write-Host $_.FullName }
        } else {
          Write-Host "VCPKG_LIB not found: $env:VCPKG_LIB"
        }

    - name: Ensure import lib name `webp.lib`
      shell: powershell
      run: |
        $libp = $env:VCPKG_LIB
        Write-Host "Ensuring import lib webp.lib exists in: $libp"
        if (-not (Test-Path $libp)) { Write-Host "VCPKG_LIB path missing: $libp"; exit 0 }
        if (Test-Path (Join-Path $libp 'webp.lib')) {
          Write-Host 'webp.lib already present.'
        } elseif (Test-Path (Join-Path $libp 'libwebp.lib')) {
          Write-Host 'Found libwebp.lib — copying to webp.lib (import lib)'
          Copy-Item (Join-Path $libp 'libwebp.lib') (Join-Path $libp 'webp.lib') -Force
        } elseif (Test-Path (Join-Path $libp 'webp_static.lib')) {
          Write-Host 'Found webp_static.lib (static library). This is not a DLL import lib.'
          Write-Host 'If you need a shared import lib (webp.lib), rebuild libwebp as shared via vcpkg (use x64-windows dynamic triplet or appropriate port options).'
        } else {
          Write-Host 'No webp library files found. Available libs:'
          Get-ChildItem -Path $libp -Filter *.lib -Recurse | ForEach-Object { Write-Host $_.FullName }
        }

    - name: Find Visual Studio
      shell: powershell
      run: |
        $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        if (-not $vs) { Write-Error 'Visual Studio with VC tools not found' ; exit 1 }
        Write-Host "Found VS at: $vs"
        echo "VS_PATH=$vs" >> $env:GITHUB_ENV

    - name: Build webp.all
      shell: cmd
      env:
        ARCH: ${{ matrix.arch }}
      run: |
        REM determine vcvars and lib sub according to ARCH
        if "%ARCH%"=="x64" (
          set "vcvars=%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          set "libsub=lib\x64"
        ) else (
          set "vcvars=%VS_PATH%\VC\Auxiliary\Build\vcvars32.bat"
          set "libsub=lib\x86"
        )
        if not exist "%vcvars%" (
          echo vcvars not found: %vcvars%
          exit /b 1
        )
        echo Using vcvars: %vcvars%
        REM prefer vcpkg-installed include/lib if present
        set "inc=%VCPKG_INC%"
        set "libp=%VCPKG_LIB%"
        if "%inc%"=="" set "inc=%CD%\webp_dll\third_party\libwebp\include"
        if "%libp%"=="" set "libp=%CD%\webp_dll\third_party\libwebp\%libsub%"
        set "out=webp_%ARCH%.all"
        call "%vcvars%"
        if exist "%libp%\\webp.lib" (
          set "libfile=webp.lib"
        ) else (
          if exist "%libp%\\libwebp.lib" (
            set "libfile=libwebp.lib"
          ) else (
            if exist "%libp%\\webp_static.lib" (
              set "libfile=webp_static.lib"
            ) else (
              echo WebP library not found in %libp%
              dir "%libp%\\*.lib"
              exit /b 1
            )
          )
        )
        echo Using webp lib: %libfile%
        cl /EHsc /LD webp_dll\webp_dll.cpp /I"%inc%" /link /LIBPATH:"%libp%" %libfile% /OUT:%out%

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: webp-${{ matrix.arch }}
        path: webp_${{ matrix.arch }}.all

  package:
    runs-on: windows-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download built artifacts x64
      uses: actions/download-artifact@v4
      with:
        name: webp-x64
        path: ./artifacts/x64

    # x86 artifact download removed: we only build x64

    - name: List artifacts
      run: dir /s

    - name: Create release (if requested or tag push)
      id: create_release
      uses: actions/create-release@v1
      if: >-
        github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
      with:
        tag_name: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag || format('v{0}', github.run_id) }}
        release_name: ${{ github.event.inputs.release_name || format('webp-build-{0}', github.run_id) }}
        body: ${{ github.event.inputs.release_body || 'Automated build of webp.all' }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release assets
      if: steps.create_release.outcome == 'success'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts\x64\webp-x64.all
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
