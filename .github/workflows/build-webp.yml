name: Build webp.all (Windows)

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release and attach artifacts'
        required: false
        default: 'false'
      release_tag:
        description: 'Release tag to create (optional; if empty and triggered by tag push, that tag is used)'
        required: false
      release_name:
        description: 'Release title'
        required: false
      release_body:
        description: 'Release notes/body'
        required: false
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [ x86, x64 ]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install libwebp via vcpkg
      shell: powershell
      run: |
        Write-Host "Setting up vcpkg and installing libwebp"
        $vcpkgDir = Join-Path $PWD 'vcpkg'
        if (-not (Test-Path $vcpkgDir)) {
          git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
        }
        Push-Location $vcpkgDir
        if (-not (Test-Path .\vcpkg.exe)) {
          & .\bootstrap-vcpkg.bat
        }
        Pop-Location
        if ('${{ matrix.arch }}' -eq 'x64') { $triplet = 'x64-windows' } else { $triplet = 'x86-windows' }
        & $vcpkgDir\vcpkg.exe install libwebp:$triplet --recurse
        $vcpkgInstalled = Join-Path $vcpkgDir 'installed'
        $inc = Join-Path $vcpkgInstalled "$triplet\include"
        $libp = Join-Path $vcpkgInstalled "$triplet\lib"
        Write-Host "vcpkg include: $inc"
        Write-Host "vcpkg lib: $libp"
        echo "VCPKG_INC=$inc" >> $env:GITHUB_ENV
        echo "VCPKG_LIB=$libp" >> $env:GITHUB_ENV

    - name: Find Visual Studio
      shell: powershell
      run: |
        $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        if (-not $vs) { Write-Error 'Visual Studio with VC tools not found' ; exit 1 }
        Write-Host "Found VS at: $vs"
        echo "VS_PATH=$vs" >> $env:GITHUB_ENV

    - name: Build webp.all
      shell: powershell
      run: |
        $vs = '${{ env.VS_PATH }}'
        if (-not $vs) { $vs = ( & 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath ) }
        if ('${{ matrix.arch }}' -eq 'x64') { $vcvars = Join-Path $vs 'VC\Auxiliary\Build\vcvars64.bat'; $libsub='lib\x64' } else { $vcvars = Join-Path $vs 'VC\Auxiliary\Build\vcvars32.bat'; $libsub='lib\x86' }
        if (-not (Test-Path $vcvars)) { Write-Error "vcvars not found: $vcvars"; exit 1 }
        Write-Host "Using vcvars: $vcvars"
        $inc = "%CD%\webp_dll\third_party\libwebp\include"
        $libp = "%CD%\webp_dll\third_party\libwebp\$libsub"
        $out = "webp_${{ matrix.arch }}.all"
        & cmd /c `"`"$vcvars`" && cl /EHsc /LD webp_dll\webp_dll.cpp /I\"$inc\" /link /LIBPATH:\"$libp\" webp.lib /OUT:$out`

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: webp-${{ matrix.arch }}
        path: webp_${{ matrix.arch }}.all

  package:
    runs-on: windows-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download built artifacts x64
      uses: actions/download-artifact@v4
      with:
        name: webp-x64
        path: ./artifacts/x64

    - name: Download built artifacts x86
      uses: actions/download-artifact@v4
      with:
        name: webp-x86
        path: ./artifacts/x86

    - name: List artifacts
      run: dir /s

    - name: Create release (if requested or tag push)
      id: create_release
      uses: actions/create-release@v1
      if: >-
        github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
      with:
        tag_name: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag || format('v{0}', github.run_id) }}
        release_name: ${{ github.event.inputs.release_name || format('webp-build-{0}', github.run_id) }}
        body: ${{ github.event.inputs.release_body || 'Automated build of webp.all' }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release assets
      if: steps.create_release.outcome == 'success'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts\x64\webp-x64.all
          artifacts\x86\webp-x86.all
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
